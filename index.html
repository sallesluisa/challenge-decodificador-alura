<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Decodificador de Texto</title>
  <link rel="stylesheet" href="reset.css">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">
</head>
<body>
  <header class="cabecalho">
    <a href="https://www.alura.com.br/" target="_blank"><img src="./img/logo-alura.svg" alt="Logo da Alura"></a>
    <h1>Challenge ONE<span>_</span></h1>
  </header>

  <main class="main-container">
    <div class="container-input">
      <div class="input">
        <textarea id="input-texto" placeholder="Digite seu texto..." autofocus></textarea>
        <p id="atencao"><img src="./img/exclamação.svg" alt="ícone de uma exclamação"> Apenas letras minúsculas e sem acento.</p>
      </div>

      <div id="output">
        <img src="./img/lupa.svg" alt="Mensagem não encontrada">
        <h2>Nenhuma mensagem encontrada</h2>
        <p>Digite um texto que deseja criptografar ou descriptografar.</p>
      </div>
    </div>
    <div class="buttons">
      <div class="container-btn">
        <button onclick="criptografar()" class="btn-criptografar">Criptografar</button>
        <button onclick="descriptografar()" class="btn-descriptografar">Descriptografar</button>
      </div>
    </div>
  </main>
  
  <footer>
    <ul >
      <li><a href="https://github.com/sallesluisa" target="_parent"><img src="./img/logo-github.png" alt="Logo do GitHub"></a></li>

      <li><a href="https://www.linkedin.com/in/luisacsalles/" target="_parent"><img src="./img/logo-linkedin.png" alt="Logo do LinkedIn"></a></li>

      <li><a href="https://www.instagram.com/luisacarvalhosalles/" target="_parent"><img src="./img/logo-instagram.png" alt="Logo do Instagram"></a></li>
    </ul>
    <p>&copy; Desenvolvido por Luísa Salles - 2022</p>
  </footer>
  <script src="script.js"></script>
</body>
</html>
